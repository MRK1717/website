<svg width="100%" viewBox="0 0 680 580" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>RC Car Block Diagram</title>
  <desc>System architecture: controller subsystem (left) and vehicle subsystem (right), connected wirelessly via HC-12.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; fill: #1a1a1a; }
      .th { font-size: 14px; font-weight: 600; }
      .ts { font-size: 12px; font-weight: 400; fill: #444; }
      .box-teal   { fill: #e1f5ee; stroke: #0f6e56; }
      .box-purple { fill: #eeedfe; stroke: #534ab7; }
      .box-amber  { fill: #faeeda; stroke: #854f0b; }
      .box-blue   { fill: #e6f1fb; stroke: #185fa5; }
      .box-gray   { fill: #f1efe8; stroke: #5f5e5a; }
      .container-teal { fill: #e1f5ee; fill-opacity: 0.4; stroke: #0f6e56; }
      .container-blue { fill: #e6f1fb; fill-opacity: 0.4; stroke: #185fa5; }
      .arr     { stroke: #444; stroke-width: 1.2; fill: none; }
      .wireless{ stroke: #888; stroke-width: 1.5; stroke-dasharray: 5 4; fill: none; }
    </style>
  </defs>

  <!-- CONTROLLER CONTAINER -->
  <rect x="18" y="28" width="278" height="530" rx="16" stroke-width="0.5" class="container-teal"/>
  <text class="th" x="157" y="54" text-anchor="middle">Controller</text>

  <!-- Inputs -->
  <rect x="32" y="70" width="78" height="52" rx="8" stroke-width="0.5" class="box-teal"/>
  <text class="th" x="71" y="91" text-anchor="middle" dominant-baseline="central">Button</text>
  <text class="ts" x="71" y="107" text-anchor="middle" dominant-baseline="central">Forward</text>

  <rect x="118" y="70" width="78" height="52" rx="8" stroke-width="0.5" class="box-teal"/>
  <text class="th" x="157" y="91" text-anchor="middle" dominant-baseline="central">Switch</text>
  <text class="ts" x="157" y="107" text-anchor="middle" dominant-baseline="central">Direction</text>

  <rect x="204" y="70" width="78" height="52" rx="8" stroke-width="0.5" class="box-teal"/>
  <text class="th" x="243" y="91" text-anchor="middle" dominant-baseline="central">Potentio-</text>
  <text class="th" x="243" y="107" text-anchor="middle" dominant-baseline="central">meter</text>

  <text class="ts" x="71"  y="140" text-anchor="middle">GPIO</text>
  <text class="ts" x="157" y="140" text-anchor="middle">GPIO</text>
  <text class="ts" x="243" y="140" text-anchor="middle">ADC</text>
  <line x1="71"  y1="122" x2="71"  y2="168" class="arr" marker-end="url(#arrow)"/>
  <line x1="157" y1="122" x2="157" y2="168" class="arr" marker-end="url(#arrow)"/>
  <line x1="243" y1="122" x2="243" y2="168" class="arr" marker-end="url(#arrow)"/>

  <!-- STM32 Controller -->
  <rect x="32" y="168" width="250" height="64" rx="8" stroke-width="0.5" class="box-purple"/>
  <text class="th" x="157" y="193" text-anchor="middle" dominant-baseline="central">STM32 NUCLEO-U545RE-Q</text>
  <text class="ts" x="157" y="213" text-anchor="middle" dominant-baseline="central">GPIO / ADC / UART</text>

  <text class="ts" x="157" y="253" text-anchor="middle">UART</text>
  <line x1="157" y1="232" x2="157" y2="270" class="arr" marker-end="url(#arrow)"/>

  <!-- HC-12 TX -->
  <rect x="57" y="270" width="200" height="52" rx="8" stroke-width="0.5" class="box-amber"/>
  <text class="th" x="157" y="291" text-anchor="middle" dominant-baseline="central">HC-12 TX</text>
  <text class="ts" x="157" y="308" text-anchor="middle" dominant-baseline="central">Transmitter 433 MHz</text>

  <!-- Breadboard -->
  <rect x="57" y="358" width="200" height="44" rx="8" stroke-width="0.5" class="box-gray"/>
  <text class="th" x="157" y="377" text-anchor="middle" dominant-baseline="central">Breadboard</text>
  <text class="ts" x="157" y="392" text-anchor="middle" dominant-baseline="central">Prototype assembly</text>

  <!-- Battery controller -->
  <rect x="57" y="478" width="200" height="52" rx="8" stroke-width="0.5" class="box-gray"/>
  <text class="th" x="157" y="499" text-anchor="middle" dominant-baseline="central">Power Supply</text>
  <text class="ts" x="157" y="516" text-anchor="middle" dominant-baseline="central">External battery</text>

  <line x1="157" y1="478" x2="157" y2="402" class="arr" marker-end="url(#arrow)"/>
  <line x1="157" y1="358" x2="157" y2="322" class="arr" marker-end="url(#arrow)"/>

  <!-- WIRELESS LINK -->
  <text class="ts" x="340" y="290" text-anchor="middle">Wireless</text>
  <text class="ts" x="340" y="304" text-anchor="middle">433 MHz</text>
  <line x1="259" y1="296" x2="310" y2="296" class="wireless" marker-end="url(#arrow)"/>
  <line x1="422" y1="296" x2="372" y2="296" class="wireless" marker-end="url(#arrow)"/>

  <!-- VEHICLE CONTAINER -->
  <rect x="384" y="28" width="278" height="530" rx="16" stroke-width="0.5" class="container-blue"/>
  <text class="th" x="523" y="54" text-anchor="middle">Vehicle</text>

  <!-- DC Motors -->
  <rect x="398" y="70" width="116" height="52" rx="8" stroke-width="0.5" class="box-blue"/>
  <text class="th" x="456" y="91" text-anchor="middle" dominant-baseline="central">2x DC Motor</text>
  <text class="ts" x="456" y="107" text-anchor="middle" dominant-baseline="central">Left</text>

  <rect x="532" y="70" width="116" height="44" rx="8" stroke-width="0.5" class="box-blue"/>
  <text class="th" x="590" y="88" text-anchor="middle" dominant-baseline="central">2x DC Motor</text>
  <text class="ts" x="590" y="104" text-anchor="middle" dominant-baseline="central">Right</text>

  <!-- L298N -->
  <rect x="423" y="152" width="200" height="52" rx="8" stroke-width="0.5" class="box-blue"/>
  <text class="th" x="523" y="173" text-anchor="middle" dominant-baseline="central">L298N Motor Driver</text>
  <text class="ts" x="523" y="190" text-anchor="middle" dominant-baseline="central">Left channel / Right channel</text>

  <line x1="456" y1="152" x2="456" y2="122" class="arr" marker-end="url(#arrow)"/>
  <line x1="590" y1="152" x2="590" y2="114" class="arr" marker-end="url(#arrow)"/>

  <!-- STM32 Vehicle -->
  <rect x="398" y="234" width="250" height="64" rx="8" stroke-width="0.5" class="box-purple"/>
  <text class="th" x="523" y="259" text-anchor="middle" dominant-baseline="central">STM32 NUCLEO-U545RE-Q</text>
  <text class="ts" x="523" y="279" text-anchor="middle" dominant-baseline="central">Command processing / PWM</text>

  <text class="ts" x="523" y="228" text-anchor="middle">PWM</text>
  <line x1="523" y1="234" x2="523" y2="204" class="arr" marker-end="url(#arrow)"/>

  <!-- HC-12 RX -->
  <rect x="423" y="328" width="200" height="52" rx="8" stroke-width="0.5" class="box-amber"/>
  <text class="th" x="523" y="349" text-anchor="middle" dominant-baseline="central">HC-12 RX</text>
  <text class="ts" x="523" y="366" text-anchor="middle" dominant-baseline="central">Receiver 433 MHz</text>

  <text class="ts" x="523" y="322" text-anchor="middle">UART</text>
  <line x1="523" y1="328" x2="523" y2="298" class="arr" marker-end="url(#arrow)"/>

  <!-- Chassis -->
  <rect x="423" y="416" width="200" height="44" rx="8" stroke-width="0.5" class="box-gray"/>
  <text class="th" x="523" y="435" text-anchor="middle" dominant-baseline="central">4-Wheel Chassis</text>
  <text class="ts" x="523" y="450" text-anchor="middle" dominant-baseline="central">Mechanical platform</text>

  <line x1="523" y1="416" x2="523" y2="380" class="arr" marker-end="url(#arrow)"/>

  <!-- Battery vehicle -->
  <rect x="423" y="478" width="200" height="52" rx="8" stroke-width="0.5" class="box-gray"/>
  <text class="th" x="523" y="499" text-anchor="middle" dominant-baseline="central">Battery Pack</text>
  <text class="ts" x="523" y="516" text-anchor="middle" dominant-baseline="central">18650 Li-Ion</text>

  <line x1="523" y1="478" x2="523" y2="460" class="arr" marker-end="url(#arrow)"/>
</svg>
